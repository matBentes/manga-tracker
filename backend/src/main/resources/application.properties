# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/manga_tracker}
spring.datasource.username=${DB_USERNAME:manga_tracker}
spring.datasource.password=${DB_PASSWORD:manga_tracker}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Mail ─────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── App ───────────────────────────────────────────────────────────────────────
app.scraper.poll-interval-minutes=${POLL_INTERVAL_MINUTES:30}
app.scraper.request-timeout-ms=${SCRAPER_TIMEOUT_MS:10000}
app.scraper.retry-max-attempts=3
app.notification.from-email=${NOTIFICATION_FROM_EMAIL:tracker@localhost}
app.notification.to-email=${NOTIFICATION_TO_EMAIL:mateus1337bentes@gmail.com}
