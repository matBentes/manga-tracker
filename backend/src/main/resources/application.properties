# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/manga_tracker}
spring.datasource.username=${DB_USERNAME:manga_tracker}
spring.datasource.password=${DB_PASSWORD:manga_tracker}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── App ───────────────────────────────────────────────────────────────────────
app.scraper.poll-interval-minutes=${POLL_INTERVAL_MINUTES:30}
app.scraper.request-timeout-ms=${SCRAPER_TIMEOUT_MS:10000}
app.scraper.retry-max-attempts=3

# ── Web Push (VAPID) ──────────────────────────────────────────────────────────
# Generate a key pair once and supply via env. Never commit the private key.
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${VAPID_SUBJECT:mailto:mateus1337bentes@gmail.com}
