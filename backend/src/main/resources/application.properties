# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
# Tomcat's RemoteIpValve resolves client IP right-to-left past trusted private-range proxies
# (nginx/ALB), so client-spoofed X-Forwarded-For tokens cannot mint fresh rate-limiter
# buckets. The framework strategy trusts the first token instead.
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# ── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/manga_tracker}
spring.datasource.username=${DB_USERNAME:manga_tracker}
spring.datasource.password=${DB_PASSWORD:manga_tracker}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── API Documentation ────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Web Push (VAPID) ──────────────────────────────────────────────────────────
# Generate a key pair once and supply via env. Never commit the private key.
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${VAPID_SUBJECT:mailto:mateus1337bentes@gmail.com}

# ── Auth (JWT cookie) ─────────────────────────────────────────────────────────
# Signing secret for the auth JWT. MUST be >= 32 bytes (256-bit); app fails fast otherwise.
# Never commit a real secret. The app fails fast when JWT_SECRET is missing.
app.auth.jwt-secret=${JWT_SECRET}
# Secure cookie flag. true in prod (HTTPS). Override to false for local http dev.
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:true}
# Seed passwords for the fixed owner/demo accounts. Unset => that account is not seeded.
app.auth.owner-password=${OWNER_PASSWORD:}
app.auth.demo-password=${DEMO_PASSWORD:}
# Extra browser origins allowed to call the API with credentials (CSV). Empty for same-origin prod.
app.auth.allowed-origins=${AUTH_ALLOWED_ORIGINS:}
