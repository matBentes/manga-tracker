name: Docs Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/pull_request_template.md'
  pull_request:
    branches: ['**']
    paths:
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/pull_request_template.md'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            docs/**/*.md
            README.md
            AGENTS.md
            CLAUDE.md
            .github/pull_request_template.md
