name: Docs Check

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: ['**']
    paths:
      - 'docs/**'
      - '**/*.md'

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
