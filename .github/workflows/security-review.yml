name: Security Review

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

# Cancel an in-progress run when a newer commit is pushed to the same ref.
# Only cancel on pull_request events so main-branch runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # Skip CodeQL when every changed file is docs/openspec/markdown. A job skipped
  # via `if:` reports a "skipped" conclusion, which counts as passing for the
  # required "CodeQL (java)" / "CodeQL (javascript-typescript)" status checks, so
  # docs-only PRs are not blocked.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            docs_only:
              - 'docs/**'
              - 'openspec/**'
              - '**/*.md'

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build Java code
        if: matrix.language == 'java'
        working-directory: backend
        run: ./gradlew classes --no-daemon

      - name: Analyze
        uses: github/codeql-action/analyze@v3
