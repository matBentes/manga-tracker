name: Security Review

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

# Cancel an in-progress run when a newer commit is pushed to the same ref.
# Only cancel on pull_request events so main-branch runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # `code` is true when at least one changed file is NOT docs/openspec/markdown.
  # `'**'` includes everything, then the `!` patterns exclude docs/openspec/md
  # (dorny default predicate-quantifier `some`). A docs-only PR leaves nothing
  # included, so `code` is empty/false and CodeQL is skipped. A job skipped via
  # `if:` reports a "skipped" conclusion, which counts as passing for the
  # required "CodeQL (java)" / "CodeQL (javascript-typescript)" status checks, so
  # docs-only PRs are not blocked.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!openspec/**'

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build Java code
        if: matrix.language == 'java'
        working-directory: backend
        run: ./gradlew classes --no-daemon

      - name: Analyze
        uses: github/codeql-action/analyze@v3
