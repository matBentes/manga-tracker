name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: ['**']

# Cancel an in-progress run when a newer commit is pushed to the same ref.
# Only cancel on pull_request events so main-branch runs always finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── Stage 0: Detect what changed ───────────────────────────────────────────
  # `code` is true when at least one changed file is NOT docs/openspec/markdown.
  # The filter is the inverse: `'**'` includes everything, then the `!` patterns
  # exclude docs/openspec/markdown (dorny default predicate-quantifier `some`
  # matches a file when it survives the exclusions). A docs-only PR leaves no
  # file included, so `code` is empty/false and the heavy suite is skipped; any
  # source/CI/config change anywhere makes `code` true and the suite runs.
  #
  # Only jobs whose required-check context is GitHub-native are gated on this,
  # because a job skipped via `if:` reports a "skipped" conclusion that counts
  # as passing for required status checks. `tests` is intentionally NOT gated:
  # it hosts the externally-posted "SonarCloud Code Analysis" required check,
  # which would never post (and thus permanently block the PR) if skipped.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!openspec/**'

  # ── Stage 1: Format & Lint ─────────────────────────────────────────────────
  format-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # Java / Spotless / Checkstyle
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Spotless (Java auto-format)
        working-directory: backend
        run: ./gradlew spotlessApply --no-daemon

      - name: Commit Spotless fixes if needed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-apply Spotless Java formatting [skip ci]"
            git push
          fi

      - name: Checkstyle (Java)
        working-directory: backend
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      # Angular / ESLint + Prettier
      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Prettier check
        working-directory: frontend
        run: npm run format:check

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Angular typecheck (strict build)
        working-directory: frontend
        run: npm run build -- --configuration production

  # ── Stage 2: Tests + Coverage ──────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: format-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_tracker
          POSTGRES_USER: manga_tracker
          POSTGRES_PASSWORD: manga_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run backend tests + coverage
        working-directory: backend
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/manga_tracker
          DB_USERNAME: manga_tracker
          DB_PASSWORD: manga_tracker
          JWT_SECRET: ci-test-secret-that-is-at-least-32-bytes-long

      - name: SonarCloud analysis
        working-directory: backend
        # Non-blocking: a SonarCloud auth/availability problem (e.g. expired SONAR_TOKEN) must not
        # block PRs. The analysis still runs and reports; re-enable blocking by removing this once
        # the token/vars are confirmed good.
        continue-on-error: true
        run: ./gradlew sonar --no-daemon
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  # ── Stage 2a: Frontend unit + E2E (mocked, no real backend) ────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [changes, format-lint]
    if: needs.changes.outputs.code == 'true'
    # The official Playwright image ships the matching browser preinstalled, so there is no flaky
    # `playwright install` download/extract step. Tag is pinned to the project's Playwright version.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v4

      # The image ships Node 20; the lock was generated with Node 24's npm, so install 24 to keep
      # `npm ci` in sync. (Browsers come from the image, independent of the Node version.)
      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npm run e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Stage 2b: Integration E2E (real backend) ───────────────────────────────
  e2e-integration:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, format-lint]
    if: needs.changes.outputs.code == 'true'
    # Run inside the Playwright image (browser preinstalled, no flaky install). Inside a container
    # job, service containers are reachable by their id as hostname (postgres), not localhost.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_tracker
          POSTGRES_USER: manga_tracker
          POSTGRES_PASSWORD: manga_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/manga_tracker
          DB_USERNAME: manga_tracker
          DB_PASSWORD: manga_tracker

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Start backend
        run: |
          java -jar backend/build/libs/*.jar \
            --spring.datasource.url=jdbc:postgresql://postgres:5432/manga_tracker \
            --spring.datasource.username=manga_tracker \
            --spring.datasource.password=manga_tracker \
            --app.auth.jwt-secret=ci-test-secret-that-is-at-least-32-bytes-long \
            --app.auth.demo-password=demo \
            --app.auth.owner-password=owner \
            --management.health.mail.enabled=false \
            --scraper.sakura.playwright.enabled=false &
          echo $! > /tmp/backend.pid
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Backend ready."
              exit 0
            fi
            echo "Waiting for backend... ($i/24)"
            sleep 5
          done
          echo "Backend did not start in time." && exit 1

      - name: Run integration E2E tests
        working-directory: frontend
        run: npm run e2e:integration

      - name: Upload integration Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-integration-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Stage 3: Build & push Docker images ───────────────────────────────────
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }},${{ env.IMAGE_PREFIX }}/backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }},${{ env.IMAGE_PREFIX }}/frontend:latest

      # Staging deployment step — add your deploy command here
      - name: Deploy to staging
        run: echo "Deploy step — configure for your hosting provider (Fly.io, Railway, ECS, etc.)"
