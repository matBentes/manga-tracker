name: CI

on:
  push:
    branches: [main, ralph/**]
  pull_request:
    branches: [main]

jobs:

  # ── Stage 1: Format & Lint ─────────────────────────────────────────────────
  format-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      # Java / Spotless / Checkstyle
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Spotless (Java auto-format)
        working-directory: backend
        run: ./gradlew spotlessApply --no-daemon

      - name: Commit Spotless fixes if needed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-apply Spotless Java formatting [skip ci]"
            git push
          fi

      - name: Checkstyle (Java)
        working-directory: backend
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      # Angular / ESLint + Prettier
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Prettier check
        working-directory: frontend
        run: npm run format:check

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Angular typecheck (strict build)
        working-directory: frontend
        run: npm run build -- --configuration production

  # ── Stage 2: Tests + Coverage ──────────────────────────────────────────────
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: format-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: manga_tracker
          POSTGRES_USER: manga_tracker
          POSTGRES_PASSWORD: manga_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run backend tests + coverage
        working-directory: backend
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/manga_tracker
          DB_USERNAME: manga_tracker
          DB_PASSWORD: manga_tracker

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      # Playwright E2E (added in US-009)
      # - name: Install Playwright browsers
      #   working-directory: frontend
      #   run: npx playwright install --with-deps chromium
      # - name: Run E2E tests
      #   working-directory: frontend
      #   run: npx playwright test

  # ── Stage 3: AI Code Review ────────────────────────────────────────────────
  code-review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: AI Code Review
        run: claude --skip-permissions -p "/code-review --comment"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 4: Build & push Docker images ───────────────────────────────────
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }},ghcr.io/${{ github.repository }}/backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }},ghcr.io/${{ github.repository }}/frontend:latest

      # Staging deployment step — add your deploy command here
      - name: Deploy to staging
        run: echo "Deploy step — configure for your hosting provider (Fly.io, Railway, ECS, etc.)"
