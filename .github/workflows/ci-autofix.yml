name: CI Auto Fix

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Auto-fix Failed CI
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.setOutput('enabled', 'false');
              core.setOutput('reason', 'No pull request associated with run.');
              return;
            }

            const prNumber = prs[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = (pr.labels || []).map((l) => l.name);
            const hasAutofixLabel = labels.includes('autofix');

            core.setOutput('enabled', hasAutofixLabel ? 'true' : 'false');
            core.setOutput(
              'reason',
              hasAutofixLabel
                ? 'autofix label present'
                : "Missing 'autofix' label on PR.",
            );
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_ref', pr.head.ref);

      - name: Skip (not enabled)
        if: steps.pr.outputs.enabled != 'true'
        run: echo "Auto-fix skipped: ${{ steps.pr.outputs.reason }}"

      - name: Checkout PR branch
        if: steps.pr.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Guard max auto-fix attempts
        if: steps.pr.outputs.enabled == 'true'
        id: attempts
        run: |
          count="$(git log --oneline --grep '^chore: auto-fix CI for run ' | wc -l | tr -d ' ')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -ge 1 ]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (attempt limit reached)
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed != 'true'
        run: echo "Auto-fix skipped: attempt limit reached."

      - name: Setup Node
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        run: npm install -g @openai/codex

      - name: Capture failed logs
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run view ${{ github.event.workflow_run.id }} --log-failed > .autofix-failed.log

      - name: Run Codex auto-fix
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is not configured. Skipping auto-fix."
            exit 0
          fi

          {
            cat <<'PROMPT'
          You are fixing a failing GitHub Actions CI run for this repository.

          Goals:
          1. Fix only what is required to make the failed checks pass.
          2. Keep changes minimal and scoped to the failing issues.
          3. Run the relevant local commands to validate fixes.

          Constraints:
          - Do not modify unrelated files.
          - Do not change branch protection or bypass rules.
          - Do not push directly to main; work only on the current PR branch.
          - If no safe fix is possible, make no code changes.

          Failed log:
          PROMPT
            cat .autofix-failed.log
          } | codex exec \
            --skip-git-repo-check \
            --dangerously-bypass-approvals-and-sandbox \
            -

      - name: Commit and push changes
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        env:
          BRANCH_NAME: ${{ steps.pr.outputs.head_ref }}
        run: |
          if git diff --quiet; then
            echo "No changes created by auto-fix."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-fix CI for run ${{ github.event.workflow_run.id }}"
          git push origin "HEAD:${BRANCH_NAME}"

      - name: Comment on PR
        if: steps.pr.outputs.enabled == 'true' && steps.attempts.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '🤖 Auto-fix workflow ran for failed CI.',
              '',
              `- Source run: ${context.payload.workflow_run.html_url}`,
              '- If changes were produced, they were pushed to this PR branch.',
              '- If no changes were produced, the failure likely requires manual intervention.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.pr_number }}'),
              body,
            });
